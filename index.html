<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View and edit CSV files in a resizable table" />
  <title>CSV Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="header">
    <div class="header__start">
      <div class="header__brand">
        <span class="header__icon" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
          </svg>
        </span>
        <h1 class="header__title">CSV Viewer</h1>
      </div>
    </div>
    <div class="header__controls" id="toolbar" hidden>
      <label class="control">
        <span class="control__label">Font size</span>
        <input type="range" id="fontSize" min="10" max="24" value="14" />
        <span class="control__value" id="fontSizeValue">14px</span>
      </label>
      <label class="control control--jlc">
        <span class="control__label">JLC Format</span>
        <select id="jlcFormatSelect" class="jlc-format-select" title="Convert to JLCPCB BOM or Pick &amp; Place">
          <option value="">Choose format…</option>
          <option value="bom">BOM</option>
          <option value="pnp">Pick &amp; Place</option>
        </select>
      </label>
      <button type="button" class="btn btn--primary" id="downloadBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download CSV
      </button>
    </div>
  </header>

  <main class="main">
    <input type="file" id="fileInput" accept=".csv,text/csv" multiple hidden />

    <section class="dropzone" id="dropzone">
      <div class="dropzone__inner">
        <div class="dropzone__icon" aria-hidden="true">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <h2 class="dropzone__title">Drop your CSV file here</h2>
        <p class="dropzone__hint">or click to browse</p>
        <p class="dropzone__meta">Multiple tabs · Edit cells · Resize with mouse · JLC BOM or Pick &amp; Place export</p>
      </div>
    </section>

    <section class="workspace" id="workspace" hidden>
      <div class="tab-bar" id="tabBar" role="tablist" aria-label="Open CSV files">
        <button type="button" class="tab-new" id="newTabBtn" aria-label="Open new tab" title="Open another CSV file">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span class="tab-new__label">New tab</span>
        </button>
      </div>
      <div class="tab-panels" id="tabPanels"></div>
    </section>
  </main>

  <dialog class="jlc-dialog" id="jlcDialog" aria-labelledby="jlcDialogTitle">
    <div class="jlc-dialog__inner">
      <h2 class="jlc-dialog__title" id="jlcDialogTitle">JLC Format</h2>
      <p class="jlc-dialog__summary" id="jlcDialogSummary"></p>
      <div class="jlc-dialog__actions">
        <button type="button" class="btn btn--primary" id="jlcDialogDownload">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download JLC CSV
        </button>
        <button type="button" class="btn btn--secondary" id="jlcDialogClose">Close</button>
      </div>
    </div>
  </dialog>

  <script src="js/jlc-format.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
